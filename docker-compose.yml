services:
  weather-db: 
    build: 
      context: ./weather-db/
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./data/:/app/data/
    command: ["python3", "main.py"]
    restart: no
  weather_dbt:
    build:
      context: ./dbt/
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data/dbt_raw:/app/data/dbt_raw/
    working_dir: /app/dbt/
    environment:
      - DBT_PROFILES_DIR=./weather_pipeline/