services:
  weather-db: 
    build: 
      context: ./weather-db/
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./data/:/app/data/
    command: ["python3", "main.py"]
    restart: no
  weather_dbt:
    build:
      context: ./dbt/
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data/dbt_raw:/app/data/dbt_raw/
      - ./dbt/weather_pipeline:/app/dbt/weather_pipeline/
    working_dir: /app/dbt/weather_pipeline/
    environment:
      - DBT_PROFILES_DIR=/app/dbt/weather_pipeline/
    command: ["dbt", "run", "--profiles-dir", "/app/dbt/weather_pipeline/"]
  dashboards:
    build:
      context: ./Dashboards/
      dockerfile: Dockerfile
    ports:
      - "3000:3080"
    volumes:
      - ./Dashboards:/app/Dashboards/
      - ./data/dbt_raw:/app/data/
    working_dir: /app/
    command: ["streamlit", "run", "./Dashboards/app.py", "--server.port=3080"]